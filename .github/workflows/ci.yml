name: CI

on:
  # Only run the build/test stage for changes that can affect it. Docs,
  # markdown, licence and image changes are skipped (paths-ignore is
  # fail-safe: any new source path triggers CI by default).
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "**.md"
      - "LICENSE"
      - "figures/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "**.md"
      - "LICENSE"
      - "figures/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build extension (CPU backend)
        run: uv pip install -e .

      - name: Lint (ruff)
        run: uvx ruff@0.14.11 check .

      - name: Format check (ruff)
        run: uvx ruff@0.14.11 format --check .

      - name: Type check (mypy)
        run: uv run --with mypy==1.19.1 mypy --ignore-missing-imports ember

      - name: Test (pytest)
        run: uv run pytest -q
